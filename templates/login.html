<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite</title><link rel="stylesheet" href="/static/css/main.css"><style>

.login-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:420px;
    padding:32px;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:32px;
    margin-bottom:10px;
}

.logo p{
    color:var(--text-muted);
}

.form-group{
    margin-bottom:16px;
}

.form-group input{
    width:100%;
    background:var(--bg);
    color:var(--text);
    padding:14px;
    border-radius:10px;
    border:1px solid var(--border);
}

.actions{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:var(--text-muted);
}

</style></head>
<body><div class="login-page"><div class="login-box card">

    <div class="logo">
        <h1>🚀 LogicStart</h1>
        <p>Programação para todos</p>
    </div>

    <div class="form-group">
        <input type="email" placeholder="Seu email">
    </div>

    <div class="form-group">
        <input type="password" placeholder="Sua senha">
    </div>

    <div class="actions">
        <button class="btn">Entrar</button>
        <button class="btn-secondary">Entrar com Google</button>
        <button class="btn-secondary">Modo Visitante</button>
    </div>

    <div class="footer">
        Não possui conta? Criar conta
    </div>

</div>

</div></body>
</html>
