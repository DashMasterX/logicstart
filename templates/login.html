<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite - Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: #202020;
    padding: 40px;
    border-radius: 16px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 25px;
}

.input-field {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #444;
    background: #121212;
    color: #fff;
    font-size: 15px;
}

.input-field:focus {
    outline: none;
    border-color: #3a78d7;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
    transition: 0.2s;
}

.btn-primary {
    background: #3a78d7;
    color: white;
}

.btn-primary:hover {
    background: #2b5ea0;
}

.btn-google {
    background: white;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-google:hover {
    background: #ddd;
}

.btn-guest {
    background: transparent;
    color: #aaa;
    border: 1px solid #444;
}

.btn-guest:hover {
    background: #2a2a2a;
}

.loader {
    display: none;
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
}

.error {
    margin-top: 10px;
    color: #ff5555;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>LogicStart Elite</h2>
    <div class="subtitle">Entre para acessar seu ambiente</div>

    <input class="input-field" type="email" id="email" placeholder="Email">
    <input class="input-field" type="password" id="senha" placeholder="Senha">

    <button class="btn btn-primary" onclick="loginEmail()">Entrar</button>

    <button class="btn btn-google" onclick="loginGoogle()">
        🔵 Entrar com Google
    </button>

    <button class="btn btn-guest" onclick="entrarSemLogin()">
        Entrar sem login
    </button>

    <div class="loader" id="loader">Carregando...</div>
    <div class="error" id="error"></div>
</div>

<script>
function setLoading(state) {
    document.getElementById("loader").style.display = state ? "block" : "none";
}

function setError(msg) {
    document.getElementById("error").textContent = msg || "";
}

function loginEmail() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if(!email || !senha) {
        setError("Preencha todos os campos.");
        return;
    }

    setError("");
    setLoading(true);

    fetch("/login/email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, senha})
    })
    .then(res => res.json())
    .then(data => {
        setLoading(false);
        if(data.success) {
            window.location.href = "/ide";
        } else {
            setError(data.error || "Erro ao logar");
        }
    })
    .catch(() => {
        setLoading(false);
        setError("Erro ao conectar com o servidor");
    });
}

function loginGoogle() {
    window.location.href = "/login/google";
}

function entrarSemLogin() {
    window.location.href = "/ide";
}
</script>

</body>
</html>
