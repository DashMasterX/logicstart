<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Empire</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.login-box {
    background: rgba(25,25,25,0.95);
    backdrop-filter: blur(10px);
    padding: 45px;
    border-radius: 18px;
    width: 360px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    animation: fade 0.5s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(15px);}
    to {opacity:1; transform:translateY(0);}
}

/* TITLES */
h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 25px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 13px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #333;
    background: #121212;
    color: #fff;
    font-size: 15px;
    transition: 0.2s;
}

.input:focus {
    outline: none;
    border-color: #3a78d7;
    box-shadow: 0 0 8px rgba(58,120,215,0.4);
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 12px;
    transition: 0.2s;
}

.btn-main {
    background: linear-gradient(135deg, #3a78d7, #2b5ea0);
    color: white;
}

.btn-main:hover {
    transform: scale(1.02);
}

/* GOOGLE */
.btn-google {
    background: white;
    color: black;
    font-weight: 500;
}

.btn-google:hover {
    background: #ddd;
}

/* GUEST */
.btn-guest {
    background: transparent;
    border: 1px solid #333;
    color: #aaa;
}

.btn-guest:hover {
    background: #1f1f1f;
}

/* STATUS */
.status {
    margin-top: 12px;
    font-size: 13px;
    min-height: 18px;
}

.error { color: #ff5555; }
.success { color: #55ff88; }

/* LOADING DOTS */
.loading::after {
    content: "...";
    animation: dots 1s infinite;
}

@keyframes dots {
    0% {content:".";}
    33% {content:"..";}
    66% {content:"...";}
}
</style>
</head>

<body>

<div class="login-box">
    <h1>LogicStart Empire</h1>
    <div class="subtitle">Ambiente profissional de desenvolvimento</div>

    <input class="input" type="email" id="email" placeholder="Email">
    <input class="input" type="password" id="senha" placeholder="Senha">

    <button class="btn btn-main" onclick="loginEmail()">Entrar</button>

    <button class="btn btn-google" onclick="loginGoogle()">
        Entrar com Google
    </button>

    <button class="btn btn-guest" onclick="guest()">
        Entrar sem login
    </button>

    <div class="status" id="status"></div>
</div>

<script>
const statusEl = document.getElementById("status");

function setStatus(msg, type="") {
    statusEl.className = "status " + type;
    statusEl.textContent = msg;
}

function loginEmail() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if(!email || !senha) {
        setStatus("Preencha todos os campos", "error");
        return;
    }

    setStatus("Conectando", "loading");

    fetch("/login/email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, senha})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            setStatus("Login realizado", "success");
            setTimeout(() => window.location.href="/ide", 800);
        } else {
            setStatus(data.error || "Erro no login", "error");
        }
    })
    .catch(() => {
        setStatus("Erro de conexão", "error");
    });
}

function loginGoogle() {
    window.location.href = "/login/google";
}

function guest() {
    window.location.href = "/ide";
}
</script>

</body>
</html>
