<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #181818;
    color: #e0e0e0;
}

header {
    background: #222;
    padding: 15px;
    text-align: center;
    font-size: 1.5em;
    font-weight: 600;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

.container {
    padding: 20px;
}

textarea {
    width: 100%;
    height: 300px;
    background: #1e1e1e;
    color: #e0e0e0;
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-family: monospace;
    font-size: 16px;
    resize: vertical;
}

.btn {
    background: #3a78d7;
    color: white;
    border: none;
    padding: 12px 20px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
    transition: background 0.2s;
}

.btn:hover {
    background: #2b5ea0;
}

.output {
    margin-top: 15px;
    background: #111;
    padding: 15px;
    border-radius: 8px;
    min-height: 120px;
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 15px;
    overflow-x: auto;
}

.btn-container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}
</style>
</head>
<body>
<header>LogicStart IDE</header>
<div class="container">
    <textarea id="codigo" placeholder="Escreva seu código aqui..."></textarea>
    <div class="btn-container">
        <button class="btn" onclick="executar()">Executar</button>
        <button class="btn" onclick="salvar()">Salvar</button>
        <button class="btn" onclick="verHistorico()">Histórico</button>
        <button class="btn" onclick="logout()">Sair</button>
    </div>
    <div class="output" id="saida">Saída aparecerá aqui...</div>
</div>

<script>
// Obtem o usuário logado da sessão
let usuario = null;
fetch("/session")
.then(res => res.json())
.then(data => {
    if(!data.user){
        window.location.href = "/login";
    } else {
        usuario = data.user;
    }
})
.catch(() => {
    alert("Erro ao verificar sessão. Redirecionando para login.");
    window.location.href = "/login";
});

function executar() {
    const codigo = document.getElementById("codigo").value;
    fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("saida").textContent = data.success ? data.result : data.error;
    })
    .catch(() => {
        document.getElementById("saida").textContent = "Erro de conexão com o servidor!";
    });
}

function salvar() {
    if(!usuario) { alert("Não há usuário logado!"); return; }
    const codigo = document.getElementById("codigo").value;
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo, email: usuario})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.success ? "Código salvo com sucesso!" : "Erro: " + data.error);
    });
}

function verHistorico() {
    if(!usuario) { alert("Não há usuário logado!"); return; }
    fetch(`/history/${encodeURIComponent(usuario)}`)
    .then(res => res.json())
    .then(data => {
        if(data.length === 0){
            alert("Nenhum código salvo para este usuário.");
        } else {
            let historicoStr = data.map((item,i) => `${i+1}. [${new Date(item.timestamp*1000).toLocaleString()}]\n${item.codigo}`).join("\n\n");
            document.getElementById("saida").textContent = historicoStr;
        }
    })
    .catch(() => {
        alert("Erro ao buscar histórico.");
    });
}

function logout() {
    fetch("/logout")
    .then(() => window.location.href = "/login");
}
</script>
</body>
</html>
