<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite IDE - Ultra</title>

<!-- CodeMirror -->
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/addon/hint/show-hint.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/addon/hint/show-hint.css">

<style>
body {margin:0;font-family:'Consolas',monospace;background:#1b1b2f;color:#f8f8f2;display:flex;flex-direction:column;min-height:100vh;}
header {display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#2c2c4a;border-bottom:2px solid #6e6ef8;box-shadow:0 2px 6px rgba(0,0,0,0.5);}
header .titulo {font-size:1.5em;font-weight:bold;}
.main-container {flex:1;display:flex;overflow:hidden;}
#file-panel {width:220px;background:#24245b;border-right:2px solid #6e6ef8;display:flex;flex-direction:column;}
#file-panel h3 {margin:12px;font-size:1.1em;font-weight:bold;color:#a0a0ff;}
.file-list {flex:1;overflow-y:auto;padding:0 10px;}
.file-list div {padding:10px;margin-bottom:6px;background:#32326c;border-radius:10px;cursor:pointer;transition:0.2s;}
.file-list div.active, .file-list div:hover {background:#6e6ef8;color:#fff;font-weight:bold;}
#editor-area {flex:2;display:flex;flex-direction:column;}
.tab-bar {display:flex;background:#32326c;border-bottom:2px solid #6e6ef8;}
.tab-bar .tab {padding:10px 16px;cursor:pointer;color:#f8f8f2;transition:0.2s;}
.tab-bar .tab.active {background:#6e6ef8;color:#fff;font-weight:bold;border-radius:8px 8px 0 0;}
.CodeMirror {flex:1;height:100%;border-radius:10px 10px 0 0;font-size:14px;border:2px solid #6e6ef8;}
#terminal {flex:1;background:#1b1b3b;padding:12px;overflow-y:auto;font-family:monospace;font-size:14px;border-top:2px solid #6e6ef8;border-radius:0 0 10px 10px;}
.terminal .info {color:#8be9fd;}
.terminal .success {color:#a0a0ff;}
.terminal .debug {color:#f1fa8c;}
.terminal .error {color:#ff6b6b;}
.float-buttons {position:fixed;bottom:30px;right:30px;display:flex;flex-direction:column;gap:18px;}
.float-buttons button {background:#6e6ef8;border:none;color:#fff;padding:14px 28px;border-radius:50px;cursor:pointer;font-weight:bold;position:relative;overflow:hidden;transition:transform 0.2s ease, box-shadow 0.3s ease;}
.float-buttons button:hover {transform:scale(1.15);box-shadow:0 6px 22px rgba(110,110,248,0.5);}
.float-buttons button::after {content:"";position:absolute;width:100px;height:100px;background:rgba(255,255,255,0.15);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);transition:transform 0.5s ease, opacity 0.5s ease;}
.float-buttons button:active::after {transform:translate(-50%,-50%) scale(3);opacity:0;}
@media (max-width:1024px){.main-container{flex-direction:column;} #file-panel{width:100%;height:150px;flex-direction:row;overflow-x:auto;} .CodeMirror{height:300px;} #terminal{height:200px;}}
</style>
</head>
<body>

<header>
<div class="titulo">LogicStart Elite IDE Ultra</div>
</header>

<div class="main-container">
<div id="file-panel">
<h3>Arquivos</h3>
<div class="file-list" id="file-list"></div>
</div>

<div id="editor-area">
<div class="tab-bar" id="tab-bar"></div>
<textarea id="editor"></textarea>
<div id="terminal" class="terminal"></div>
</div>
</div>

<div class="float-buttons">
<button onclick="executarCodigo()">▶ Run</button>
<button onclick="salvarCodigo()">💾 Save</button>
<button onclick="abrirIA()">🤖 Chat IA</button>
<button onclick="gerarCodigoIA()">🧠 Gerar Código IA</button>
</div>

<script>
/* ===== Editor ===== */
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
mode: "python",
theme: "dracula",
lineNumbers:true,
lineWrapping:true,
indentUnit:4,
tabSize:4,
extraKeys: {"Ctrl-Space":"autocomplete"}
});

/* ===== Autocomplete LogicStart ===== */
const keywords = ["inicio","fim","se","senao","enquanto","para","funcao","var","let","const","retorna","print","console.log"];
editor.on("inputRead", function(cm, change){
let cur = cm.getCursor();
let token = cm.getTokenAt(cur);
let start = token.start;
let end = cur.ch;
let word = token.string;
let list = keywords.filter(w=>w.startsWith(word));
if(list.length>0) cm.showHint({hint: function(){return {list:list, from:CodeMirror.Pos(cur.line,start),to:CodeMirror.Pos(cur.line,end)}}});
});

/* ===== Arquivos ===== */
let arquivos = {};
let arquivoAtivo = null;
function atualizarAbas(){const tabBar=document.getElementById("tab-bar");tabBar.innerHTML="";Object.keys(arquivos).forEach(nome=>{let div=document.createElement("div");div.textContent=nome;div.className=(nome===arquivoAtivo)?"tab active":"tab";div.onclick=()=>abrirArquivo(nome);tabBar.appendChild(div);});}
function atualizarListaArquivos(){const lista=document.getElementById("file-list");lista.innerHTML="";Object.keys(arquivos).forEach(nome=>{let div=document.createElement("div");div.textContent=nome;div.className=(nome===arquivoAtivo)?"active":"";div.onclick=()=>abrirArquivo(nome);lista.appendChild(div);});}
function abrirArquivo(nome){if(!arquivos[nome]) return logTerminal(`Arquivo '${nome}' não encontrado`,"error");arquivoAtivo=nome;editor.setValue(arquivos[nome]);atualizarAbas();atualizarListaArquivos();}
function salvarArquivoLocal(){if(!arquivoAtivo) return;arquivos[arquivoAtivo]=editor.getValue();}

/* ===== Terminal ===== */
let terminal = document.getElementById("terminal");
function logTerminal(texto,tipo="info"){let div=document.createElement("div");div.className=tipo;div.innerHTML=texto.replace(/\n/g,"<br>");terminal.appendChild(div);terminal.scrollTop=terminal.scrollHeight;}
function limparTerminal(){terminal.innerHTML="";}

/* ===== Operações ===== */
function executarCodigo(){salvarArquivoLocal();let codigo=editor.getValue();logTerminal("> Executando...","info");fetch("/executar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({codigo:codigo,user_id:"default"})}).then(res=>res.json()).then(d=>{if(d.status==="ok")logTerminal(d.data.saida,"success");else logTerminal(d.mensagem,"error");});}

function salvarCodigo(){salvarArquivoLocal();if(!arquivoAtivo) arquivoAtivo=prompt("Nome do arquivo:");if(!arquivoAtivo)return;fetch("/files",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:"default",nome:arquivoAtivo,codigo:editor.getValue()})}).then(res=>res.json()).then(d=>{if(d.status==="ok")logTerminal(`Arquivo '${arquivoAtivo}' salvo!`,"success");else logTerminal(d.mensagem,"error");});}

function abrirIA(){let msg=prompt("Pergunte algo à IA:");if(!msg)return;fetch("/ia/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:"default",mensagem:msg})}).then(res=>res.json()).then(d=>{if(d.status==="ok")logTerminal("🤖 "+d.data,"debug");else logTerminal(d.mensagem,"error");});}

function gerarCodigoIA(){let pedido=prompt("Digite o que quer gerar em LogicStart:");if(!pedido)return;fetch("/ia/gerar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:"default",pedido:pedido})}).then(res=>res.json()).then(d=>{if(d.status==="ok")logTerminal("🧠 "+d.data,"debug");else logTerminal(d.mensagem,"error");});}

/* ===== Inicialização ===== */
function carregarArquivos(){fetch("/files?user_id=default").then(res=>res.json()).then(d=>{if(d.status==="ok"){d.data.forEach(f=>arquivos[f.nome]=f.codigo);if(Object.keys(arquivos).length>0){arquivoAtivo=Object.keys(arquivos)[0];abrirArquivo(arquivoAtivo);}atualizarAbas();atualizarListaArquivos();}});}
document.addEventListener("DOMContentLoaded",()=>{carregarArquivos();});
</script>

</body>
</html>
