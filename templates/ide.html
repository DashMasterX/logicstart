<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite Pro Max</title>

<!-- CodeMirror CSS -->
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Consolas', monospace;
    background: #1c1c2e;
    color: #f8f8f2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
header {
    background: #2b2b44;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #5e5ed4;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

header .titulo {
    font-size: 1.5em;
    font-weight: bold;
}

header .menu {
    position: relative;
}

header .menu-btn {
    font-size: 1.4em;
    background: none;
    border: none;
    color: #f8f8f2;
    cursor: pointer;
    padding: 4px 8px;
}

header .menu-content {
    display: none;
    position: absolute;
    top: 35px;
    right: 0;
    background: #2b2b44;
    border: 1px solid #5e5ed4;
    border-radius: 8px;
    overflow: hidden;
    z-index: 10;
}

header .menu-content button {
    display: block;
    width: 150px;
    padding: 10px 16px;
    background: #2b2b44;
    color: #f8f8f2;
    border: none;
    text-align: left;
    cursor: pointer;
    transition: 0.2s;
}
header .menu-content button:hover {
    background: #5e5ed4;
    color: #fff;
    font-weight: bold;
}

/* Layout principal */
.main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* Painel lateral de arquivos */
#file-panel {
    width: 220px;
    background: #24244b;
    border-right: 2px solid #5e5ed4;
    display: flex;
    flex-direction: column;
}

#file-panel h3 {
    margin: 12px;
    font-size: 1.1em;
    font-weight: bold;
    color: #a0a0ff;
}

.file-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px;
}

.file-list div {
    padding: 10px;
    margin-bottom: 6px;
    background: #32325c;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.file-list div.active, .file-list div:hover {
    background: #5e5ed4;
    color: #fff;
    font-weight: bold;
}

/* Editor com abas */
#editor-area {
    flex: 2;
    display: flex;
    flex-direction: column;
}

.tab-bar {
    display: flex;
    background: #32325c;
    border-bottom: 2px solid #5e5ed4;
}

.tab-bar div {
    padding: 10px 16px;
    cursor: pointer;
    color: #f8f8f2;
    transition: 0.2s;
}

.tab-bar div.active {
    background: #5e5ed4;
    color: #fff;
    font-weight: bold;
    border-radius: 8px 8px 0 0;
}

/* Editor CodeMirror */
.CodeMirror {
    flex: 1;
    height: 100%;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    border: 2px solid #5e5ed4;
}

/* Terminal */
#terminal {
    flex: 1;
    background: #1b1b3b;
    padding: 12px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 14px;
    border-top: 2px solid #5e5ed4;
    border-radius: 0 0 10px 10px;
}

.terminal .info { color: #8be9fd; }
.terminal .success { color: #a0a0ff; }
.terminal .error { color: #ff6b6b; }

/* Botões flutuantes */
.float-buttons {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.float-buttons button {
    background: #5e5ed4;
    border: none;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
}

.float-buttons button:hover {
    transform: scale(1.15);
    box-shadow: 0 6px 22px rgba(94,94,212,0.5);
}

.float-buttons button::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.5s ease, opacity 0.5s ease;
}

.float-buttons button:active::after {
    transform: translate(-50%,-50%) scale(3);
    opacity: 0;
}

/* Responsivo */
@media (max-width: 1024px) {
    .main-container { flex-direction: column; }
    #file-panel { width: 100%; height: 150px; flex-direction: row; overflow-x: auto; }
    .CodeMirror { height: 300px; }
    #terminal { height: 200px; }
}
</style>
</head>
<body>

<header>
    <div class="titulo">LogicStart Elite Pro Max</div>
    <div class="menu">
        <button class="menu-btn">⋮</button>
        <div class="menu-content">
            <button onclick="novoArquivo()">Novo Arquivo</button>
            <button onclick="salvarCodigo()">Salvar</button>
            <button onclick="executarCodigo()">Executar</button>
            <button onclick="limparTerminal()">Limpar Terminal</button>
        </div>
    </div>
</header>

<div class="main-container">
    <div id="file-panel">
        <h3>Arquivos</h3>
        <div class="file-list" id="file-list">
            <div onclick="abrirArquivo('main')" class="active">main.ls</div>
            <div onclick="abrirArquivo('teste')">teste.ls</div>
        </div>
    </div>

    <div id="editor-area">
        <div class="tab-bar" id="tab-bar">
            <div class="tab active" onclick="abrirAba('main')">main.ls</div>
            <div class="tab" onclick="abrirAba('teste')">teste.ls</div>
        </div>
        <textarea id="editor"></textarea>
        <div id="terminal" class="terminal"></div>
    </div>
</div>

<div class="float-buttons">
    <button onclick="executarCodigo()">▶ Run</button>
    <button onclick="salvarCodigo()">💾 Save</button>
</div>

<!-- CodeMirror JS -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<!-- Editor JS -->
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>

<script>
// Menu dropdown
const menuBtn = document.querySelector(".menu-btn");
const menuContent = document.querySelector(".menu-content");
menuBtn.addEventListener("click", () => {
    menuContent.style.display = menuContent.style.display === "block" ? "none" : "block";
});
document.addEventListener("click", (e) => {
    if (!menuBtn.contains(e.target) && !menuContent.contains(e.target)) {
        menuContent.style.display = "none";
    }
});
</script>

</body>
</html>
