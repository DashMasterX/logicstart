<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE</title>

<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/material-darker.css" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    display:flex;
    height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width:220px;
    background:#020617;
    border-right:1px solid #1e293b;
    display:flex;
    flex-direction:column;
}

.sidebar h2 {
    padding:15px;
    font-size:14px;
    color:#38bdf8;
}

.file {
    padding:10px 15px;
    cursor:pointer;
    border-radius:8px;
    margin:5px;
    transition:.2s;
}

.file:hover {
    background:#1e293b;
}

.file.active {
    background:#38bdf8;
    color:#000;
}

/* ===== MAIN ===== */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== TOPBAR ===== */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#020617;
    padding:10px;
    border-bottom:1px solid #1e293b;
}

.tabs {
    display:flex;
    gap:5px;
}

.tab {
    padding:8px 14px;
    background:#1e293b;
    border-radius:8px 8px 0 0;
    cursor:pointer;
}

.tab.active {
    background:#38bdf8;
    color:black;
}

/* ===== EDITOR ===== */
.editor-container {
    flex:1;
}

.CodeMirror {
    height:100%;
    font-size:14px;
}

/* ===== TERMINAL ===== */
.terminal {
    height:180px;
    background:#020617;
    border-top:1px solid #1e293b;
    padding:10px;
    overflow:auto;
    font-family:monospace;
}

/* ===== BOTÕES ===== */
.actions button {
    margin-left:10px;
    border:none;
    background:#1e293b;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
    transition:.2s;
}

.actions button:hover {
    background:#38bdf8;
    color:black;
    transform:scale(1.1);
}

/* ===== RESPONSIVO ===== */
@media(max-width:900px){
    .sidebar{display:none;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Arquivos</h2>
    <div id="files"></div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="tabs" id="tabs"></div>

        <div class="actions">
            <button onclick="executarCodigo()">▶</button>
            <button onclick="novoArquivo()">+</button>
            <button onclick="salvar()">💾</button>
        </div>
    </div>

    <!-- EDITOR -->
    <div class="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <!-- TERMINAL -->
    <div class="terminal" id="terminal"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<script>

/* ===== EDITOR ===== */
let editor = CodeMirror.fromTextArea(document.getElementById("editor"),{
    mode:"python",
    theme:"material-darker",
    lineNumbers:true
});

/* ===== ARQUIVOS ===== */
let arquivos = JSON.parse(localStorage.getItem("arquivos")) || {
    "main": 'variavel x = 5\nimprimir(x)'
};

let atual = "main";

/* ===== UI ===== */
function render(){
    // files
    let f = document.getElementById("files");
    f.innerHTML="";
    Object.keys(arquivos).forEach(nome=>{
        let el=document.createElement("div");
        el.className="file "+(nome===atual?"active":"");
        el.innerText=nome+".ls";
        el.onclick=()=>abrir(nome);
        f.appendChild(el);
    });

    // tabs
    let t=document.getElementById("tabs");
    t.innerHTML="";
    Object.keys(arquivos).forEach(nome=>{
        let el=document.createElement("div");
        el.className="tab "+(nome===atual?"active":"");
        el.innerText=nome;
        el.onclick=()=>abrir(nome);
        t.appendChild(el);
    });
}

function abrir(nome){
    atual=nome;
    editor.setValue(arquivos[nome]);
    render();
}

function salvar(){
    arquivos[atual]=editor.getValue();
    localStorage.setItem("arquivos",JSON.stringify(arquivos));
    log("Salvo com sucesso","ok");
}

function novoArquivo(){
    let nome=prompt("Nome:");
    if(!nome)return;
    arquivos[nome]="";
    abrir(nome);
}

/* ===== TERMINAL ===== */
function log(txt,type="info"){
    let t=document.getElementById("terminal");
    let d=document.createElement("div");
    d.innerText=txt;

    if(type==="error") d.style.color="#ef4444";
    if(type==="ok") d.style.color="#22c55e";

    t.appendChild(d);
    t.scrollTop=t.scrollHeight;
}

/* ===== EXECUÇÃO REAL ===== */
async function executarCodigo(){
    salvar();
    log("Executando...");

    try{
        let res = await fetch("http://localhost:5000/executar",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({codigo:editor.getValue()})
        });

        let data = await res.json();

        if(data.erro){
            log(data.erro,"error");
        }else{
            log(data.saida.join("\n"),"ok");
        }

    }catch{
        log("Erro ao conectar com engine","error");
    }
}

/* ===== INIT ===== */
render();
abrir(atual);

</script>

</body>
</html>
