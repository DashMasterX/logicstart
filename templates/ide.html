<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite IDE</title>

<!-- CodeMirror 6 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/theme/monokai.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/mode/javascript/javascript.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/hint/show-hint.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/hint/show-hint.css">

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color:#e0e0e0;
}
#ide-container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 20px;
}
.cm-editor { height: 400px; border-radius: 8px; }
.controls { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
.controls .btn { flex:1; min-width:120px; padding:10px; border:none; border-radius:8px; cursor:pointer; transition:0.2s; }
.controls .btn:hover { opacity:0.85; }
.btn-run { background:#3a78d7; color:#fff; }
.btn-save { background:#28a745; color:#fff; }
.btn-history { background:#ffc107; color:#000; }
.btn-logout { background:#dc3545; color:#fff; }
#saida {
    margin-top:15px;
    background:#111;
    padding:15px;
    border-radius:8px;
    min-height:200px;
    font-family:monospace;
    white-space:pre-wrap;
    overflow-y:auto;
}
.ia-panel { margin-top:20px; background:#202020; padding:15px; border-radius:8px; }
.ia-panel h3 { margin:0 0 10px 0; font-size:16px; }
.ia-panel textarea { width:100%; height:60px; background:#121212; color:#fff; border:none; border-radius:5px; padding:8px; margin-bottom:10px; font-family:monospace; }
.ia-panel button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; background:#3a78d7; color:#fff; transition:0.2s; margin-right:5px; }
.ia-panel button:hover { opacity:0.85; }
</style>
</head>
<body>

<div id="ide-container">
    <textarea id="codigo">// Escreva seu código LogicStart aqui</textarea>

    <div class="controls">
        <button class="btn btn-run" onclick="executar()">Executar</button>
        <button class="btn btn-save" onclick="salvar()">Salvar</button>
        <button class="btn btn-history" onclick="verHistorico()">Histórico</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>

    <div id="saida">Saída do programa aparecerá aqui...</div>

    <div class="ia-panel">
        <h3>Assistente IA</h3>
        <textarea id="ia-prompt" placeholder="Pergunte algo à IA ou peça código..."></textarea>
        <button onclick="iaChat()">💬 Chat</button>
        <button onclick="iaGerar()">📝 Gerar Código</button>
        <button onclick="iaExplicar()">📖 Explicar Código</button>
        <button onclick="iaCorrigir()">🛠 Corrigir Código</button>
        <div id="ia-resposta" style="margin-top:10px; white-space:pre-wrap; font-family:monospace;"></div>
    </div>
</div>

<script>
let editor = CodeMirror.fromTextArea(document.getElementById("codigo"), {
    mode: "javascript",
    theme: "monokai",
    lineNumbers: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    styleActiveLine: true
});

// -------- FUNÇÕES IDE --------
function executar(){
    fetch("/executar", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({codigo: editor.getValue(), user_id:"default"})
    })
    .then(r=>r.json()).then(d=>{
        document.getElementById("saida").textContent = d.status==="ok" ? d.data.saida : "Erro: "+d.mensagem;
    });
}

function salvar(){
    fetch("/files", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({codigo: editor.getValue(), nome:"main", user_id:"default"})
    })
    .then(r=>r.json()).then(d=>{
        alert(d.status==="ok" ? "Arquivo salvo!" : "Erro ao salvar");
    });
}

function verHistorico(){
    fetch("/history")
    .then(r=>r.json()).then(d=>{
        if(!d.length){ alert("Nenhum histórico"); return; }
        let txt = d.map((l,i)=>`${i+1} - ${l}`).join("\n");
        document.getElementById("saida").textContent = txt;
    });
}

function logout(){ window.location.href="/logout"; }

// -------- FUNÇÕES IA --------
function iaChat(){ iaRequest("/ia/chat"); }
function iaGerar(){ iaRequest("/ia/gerar"); }
function iaExplicar(){ iaRequest("/ia/explicar"); }
function iaCorrigir(){ iaRequest("/ia/corrigir"); }

function iaRequest(url){
    const prompt = document.getElementById("ia-prompt").value;
    fetch(url, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mensagem: prompt, codigo: editor.getValue(), user_id:"default", pedido: prompt})
    })
    .then(r=>r.json()).then(d=>{
        document.getElementById("ia-resposta").textContent = d.status==="ok" ? d.data : "Erro IA";
    });
}
</script>

</body>
</html>
