<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite</title>

<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">

<style>
body { margin:0; font-family:'Consolas', monospace; background:#1b1b2f; color:#f8f8f2; display:flex; flex-direction:column; min-height:100vh;}
header {display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#2c2c4a; border-bottom:2px solid #6e6ef8; box-shadow:0 2px 6px rgba(0,0,0,0.5);}
header .titulo {font-size:1.5em; font-weight:bold;}
header .menu {position:relative;}
header .menu-btn {font-size:1.4em; background:none; border:none; color:#f8f8f2; cursor:pointer; padding:4px 8px;}
header .menu-content {display:none; position:absolute; top:35px; right:0; background:#2c2c4a; border:1px solid #6e6ef8; border-radius:8px; overflow:hidden; z-index:10;}
header .menu-content button {display:block; width:180px; padding:10px 16px; background:#2c2c4a; color:#f8f8f2; border:none; text-align:left; cursor:pointer; transition:0.2s;}
header .menu-content button:hover {background:#6e6ef8; color:#fff; font-weight:bold;}

.main-container {flex:1; display:flex; overflow:hidden;}
#file-panel {width:220px; background:#24245b; border-right:2px solid #6e6ef8; display:flex; flex-direction:column;}
#file-panel h3 {margin:12px; font-size:1.1em; font-weight:bold; color:#a0a0ff;}
.file-list {flex:1; overflow-y:auto; padding:0 10px;}
.file-list div {padding:10px; margin-bottom:6px; background:#32326c; border-radius:10px; cursor:pointer; transition:0.2s;}
.file-list div.active, .file-list div:hover {background:#6e6ef8; color:#fff; font-weight:bold;}

#editor-area {flex:2; display:flex; flex-direction:column;}
.tab-bar {display:flex; background:#32326c; border-bottom:2px solid #6e6ef8;}
.tab-bar .tab {padding:10px 16px; cursor:pointer; color:#f8f8f2; transition:0.2s;}
.tab-bar .tab.active {background:#6e6ef8; color:#fff; font-weight:bold; border-radius:8px 8px 0 0;}

.CodeMirror {flex:1; height:100%; border-radius:10px 10px 0 0; font-size:14px; border:2px solid #6e6ef8;}

#terminal {flex:1; background:#1b1b3b; padding:12px; overflow-y:auto; font-family:monospace; font-size:14px; border-top:2px solid #6e6ef8; border-radius:0 0 10px 10px;}
.terminal .info {color:#8be9fd;}
.terminal .success {color:#a0a0ff;}
.terminal .debug {color:#f1fa8c;}
.terminal .error {color:#ff6b6b;}

.float-buttons {position:fixed; bottom:30px; right:30px; display:flex; flex-direction:column; gap:18px;}
.float-buttons button {background:#6e6ef8; border:none; color:#fff; padding:14px 28px; border-radius:50px; cursor:pointer; font-weight:bold; position:relative; overflow:hidden; transition:transform 0.2s ease, box-shadow 0.3s ease;}
.float-buttons button:hover {transform:scale(1.15); box-shadow:0 6px 22px rgba(110,110,248,0.5);}
.float-buttons button::after {content:""; position:absolute; width:100px; height:100px; background:rgba(255,255,255,0.15); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); transition:transform 0.5s ease, opacity 0.5s ease;}
.float-buttons button:active::after {transform:translate(-50%,-50%) scale(3); opacity:0;}

@media (max-width:1024px){.main-container{flex-direction:column;} #file-panel{width:100%; height:150px; flex-direction:row; overflow-x:auto;} .CodeMirror{height:300px;} #terminal{height:200px;}}
</style>
</head>
<body>

<header>
<div class="titulo">LogicStart Elite Plus Pro Max</div>
<div class="menu">
    <button class="menu-btn">⋮</button>
    <div class="menu-content">
        <button onclick="novoArquivo()">Novo Arquivo</button>
        <button onclick="salvarCodigo()">Salvar</button>
        <button onclick="executarCodigo()">Executar</button>
        <button onclick="limparTerminal()">Limpar Terminal</button>
    </div>
</div>
</header>

<div class="main-container">
<div id="file-panel">
    <h3>Arquivos</h3>
    <div class="file-list" id="file-list"></div>
</div>
<div id="editor-area">
    <div class="tab-bar" id="tab-bar"></div>
    <textarea id="editor"></textarea>
    <div id="terminal" class="terminal"></div>
</div>
</div>

<div class="float-buttons">
    <button onclick="executarCodigo()">▶ Run</button>
    <button onclick="salvarCodigo()">💾 Save</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<script>
/* ===== Editor ===== */
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: "python",
    theme: "dracula",
    lineNumbers:true,
    lineWrapping:true,
    indentUnit:4,
    tabSize:4,
    extraKeys: {"Ctrl-Space":"autocomplete"}
});

/* ===== Arquivos ===== */
let arquivos = JSON.parse(localStorage.getItem("arquivos")) || {
    "main":"# Código inicial LogicStart\n",
    "teste":"# Código de teste\n"
};
let arquivoAtivo = "main";

function salvarLocal(){localStorage.setItem("arquivos", JSON.stringify(arquivos));}

/* ===== Atualiza abas e lista ===== */
function atualizarAbas(){const tabBar=document.getElementById("tab-bar"); tabBar.innerHTML=""; Object.keys(arquivos).forEach(n=>{let div=document.createElement("div"); div.textContent=n+".ls"; div.className=(n===arquivoAtivo)?"tab active":"tab"; div.onclick=()=>abrirArquivo(n); div.draggable=true; div.ondragstart=(e)=>e.dataTransfer.setData("text",n); div.ondragover=(e)=>e.preventDefault(); div.ondrop=(e)=>{const from=e.dataTransfer.getData("text"); if(from!==n){let arr=Object.keys(arquivos); arr.splice(arr.indexOf(from),1); arr.splice(arr.indexOf(n),0,from); let novos={}; arr.forEach(x=>novos[x]=arquivos[x]); arquivos=novos; atualizarAbas(); atualizarArquivoLista(); salvarLocal();}}; tabBar.appendChild(div);}); atualizarArquivoLista();}

function atualizarArquivoLista(){const lista=document.getElementById("file-list"); lista.innerHTML=""; Object.keys(arquivos).forEach(n=>{let div=document.createElement("div"); div.textContent=n+".ls"; div.className=(n===arquivoAtivo)?"active":""; div.onclick=()=>abrirArquivo(n); lista.appendChild(div);});}

/* ===== Abrir arquivo ===== */
function abrirArquivo(nome){if(!arquivos[nome]) return logTerminal(`Arquivo '${nome}' não existe`,"error"); arquivoAtivo=nome; editor.setValue(arquivos[nome]); atualizarAbas(); salvarLocal();}

/* ===== Terminal ===== */
let terminal=document.getElementById("terminal");
function limparTerminal(){terminal.innerHTML="";}
function logTerminal(texto,tipo="info"){let div=document.createElement("div"); div.className=tipo; div.innerHTML=texto.replace(/\n/g,"<br>"); terminal.appendChild(div); terminal.scrollTop=terminal.scrollHeight;}

/* ===== Arquivo ativo ===== */
function atualizarArquivoAtivo(){arquivos[arquivoAtivo]=editor.getValue(); salvarLocal();}

/* ===== Executar ===== */
function executarCodigo(){atualizarArquivoAtivo(); logTerminal("> Executando...","info"); try{let res=eval(editor.getValue()); logTerminal(res??"Execução concluída","success");}catch(e){logTerminal(e.message,"error");}}

/* ===== Salvar ===== */
function salvarCodigo(){atualizarArquivoAtivo(); logTerminal(`Arquivo '${arquivoAtivo}.ls' salvo!`,"success");}

/* ===== Novo arquivo ===== */
function novoArquivo(){let nome=prompt("Nome do novo arquivo:"); if(!nome) return; nome=nome.replace(/\W/g,"_"); if(arquivos[nome]) return logTerminal(`Arquivo '${nome}' já existe`,"error"); arquivos[nome]="# Novo arquivo\n"; abrirArquivo(nome);}

/* ===== Inicialização ===== */
document.addEventListener("DOMContentLoaded",()=>{atualizarAbas(); abrirArquivo(arquivoAtivo);});

/* ===== Menu Dropdown ===== */
const menuBtn=document.querySelector(".menu-btn");
const menuContent=document.querySelector(".menu-content");
menuBtn.addEventListener("click",()=>{menuContent.style.display=menuContent.style.display==="block"?"none":"block";});
document.addEventListener("click",(e)=>{if(!menuBtn.contains(e.target) && !menuContent.contains(e.target)){menuContent.style.display="none";}});
</script>

</body>
</html>
