<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite MAX PRO PLUS</title>

<!-- CodeMirror CSS -->
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Consolas', monospace;
    background: #1b1b2f;
    color: #f8f8f2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
header {
    background: #28284b;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #50fa7b;
}
header div:first-child {
    font-size: 1.6em;
    font-weight: bold;
    color: #50fa7b;
}
header button {
    background: linear-gradient(90deg, #6272a4, #50fa7b);
    border: none;
    color: white;
    padding: 10px 20px;
    margin-left: 12px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
}
header button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 22px rgba(80,250,123,0.5);
}
.main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
}
#file-panel {
    width: 220px;
    background: #191932;
    border-right: 2px solid #50fa7b;
    display: flex;
    flex-direction: column;
}
#file-panel h3 {
    margin: 12px;
    font-size: 1.1em;
    font-weight: bold;
    color: #8be9fd;
}
.file-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px;
}
.file-list div {
    padding: 10px;
    margin-bottom: 6px;
    background: #28284b;
    border-radius: 10px;
    cursor: pointer;
}
.file-list div.active, .file-list div:hover {
    background: #50fa7b;
    color: #000;
    font-weight: bold;
}
#editor-area {
    flex: 2;
    display: flex;
    flex-direction: column;
}
.tab-bar {
    display: flex;
    background: #28284b;
    border-bottom: 2px solid #50fa7b;
}
.tab-bar div {
    padding: 10px 16px;
    cursor: pointer;
    color: #f8f8f2;
}
.tab-bar div.active {
    background: #50fa7b;
    color: #000;
    font-weight: bold;
    border-radius: 8px 8px 0 0;
}
.CodeMirror {
    flex: 1;
    height: 100%;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    border: 2px solid #50fa7b;
}
#terminal {
    flex: 1;
    background: #1a1a3b;
    padding: 12px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 14px;
    border-top: 2px solid #50fa7b;
    border-radius: 0 0 10px 10px;
}
.terminal .info { color: #8be9fd; }
.terminal .success { color: #50fa7b; }
.terminal .error { color: #ff5555; }
.float-buttons {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}
.float-buttons button {
    background: linear-gradient(45deg,#6272a4,#50fa7b);
    border: none;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
}
@media (max-width: 1024px) {
    .main-container { flex-direction: column; }
    #file-panel { width: 100%; height: 150px; flex-direction: row; overflow-x: auto; }
    #editor-area { flex: 1; }
    .CodeMirror { height: 300px; }
    #terminal { height: 200px; }
}
</style>
</head>
<body>

<header>
    <div>LogicStart Elite MAX PRO PLUS</div>
    <div>
        <button id="run-btn">▶ Executar</button>
        <button id="save-btn">💾 Salvar</button>
        <button id="clear-btn">🗑 Limpar</button>
        <button id="new-btn">📄 Novo</button>
        <button id="del-btn">❌ Remover</button>
        <button id="download-btn">⬇️ Download</button>
        <input type="file" id="upload-input" style="display:none">
        <button id="upload-btn">⬆️ Upload</button>
    </div>
</header>

<div class="main-container">
    <div id="file-panel">
        <h3>Arquivos</h3>
        <div class="file-list" id="file-list"></div>
    </div>
    <div id="editor-area">
        <div class="tab-bar" id="tab-bar"></div>
        <textarea id="editor"></textarea>
        <div id="terminal" class="terminal"></div>
    </div>
</div>

<div class="float-buttons">
    <button id="run-float">▶ Run</button>
    <button id="save-float">💾 Save</button>
    <button id="clear-float">🗑 Clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/javascript/javascript.js"></script>

<script>
// ===== Inicializa CodeMirror =====
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: "javascript",
    theme: "dracula",
    lineNumbers: true,
    lineWrapping: true,
    tabSize: 4
});

// ===== Arquivos locais =====
let arquivos = JSON.parse(localStorage.getItem("logicstart_arquivos")) || {
    "main": "// Código principal\n",
    "teste": "// Código de teste\n"
};
let arquivoAtivo = Object.keys(arquivos)[0];

// ===== Funções de arquivos =====
function salvarLocal() { localStorage.setItem("logicstart_arquivos", JSON.stringify(arquivos)); }
function atualizarAbas() {
    const tabBar = document.getElementById("tab-bar");
    const fileList = document.getElementById("file-list");
    tabBar.innerHTML = "";
    fileList.innerHTML = "";
    Object.keys(arquivos).forEach(nome => {
        let tab = document.createElement("div");
        tab.textContent = nome + ".ls";
        tab.className = (nome === arquivoAtivo) ? "tab active" : "tab";
        tab.onclick = () => abrirArquivo(nome);
        tabBar.appendChild(tab);

        let fdiv = document.createElement("div");
        fdiv.textContent = nome + ".ls";
        fdiv.className = (nome === arquivoAtivo) ? "active" : "";
        fdiv.onclick = () => abrirArquivo(nome);
        fileList.appendChild(fdiv);
    });
}
function abrirArquivo(nome) {
    arquivoAtivo = nome;
    editor.setValue(arquivos[nome]);
    atualizarAbas();
    logTerminal(`Arquivo '${nome}.ls' aberto`, "info");
}
function atualizarArquivo() { arquivos[arquivoAtivo] = editor.getValue(); salvarLocal(); }
function novoArquivo() {
    let nome = prompt("Nome do novo arquivo:").replace(/\W/g,"_");
    if(!nome || arquivos[nome]) return logTerminal("Arquivo inválido ou já existe", "error");
    arquivos[nome] = "// Novo arquivo\n";
    arquivoAtivo = nome;
    atualizarAbas();
    editor.setValue(arquivos[nome]);
    salvarLocal();
}
function removerArquivo() {
    if(arquivoAtivo === "main") return logTerminal("Não é possível remover main", "error");
    delete arquivos[arquivoAtivo];
    arquivoAtivo = Object.keys(arquivos)[0];
    abrirArquivo(arquivoAtivo);
    salvarLocal();
}
function limparTerminal() { document.getElementById("terminal").innerHTML = ""; }
function logTerminal(msg, tipo="info") {
    let t = document.getElementById("terminal");
    let div = document.createElement("div");
    div.className = tipo;
    div.innerHTML = msg.replace(/\n/g,"<br>");
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
}
function executarCodigo() {
    atualizarArquivo();
    try {
        let result = eval(editor.getValue());
        logTerminal(result !== undefined ? result : "Executado", "success");
    } catch(e){ logTerminal(e, "error"); }
}

// ===== Export / Download =====
function baixarArquivo() {
    atualizarArquivo();
    let blob = new Blob([arquivos[arquivoAtivo]], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = arquivoAtivo + ".ls";
    a.click();
}

// ===== Import / Upload =====
function uploadArquivo() {
    let input = document.getElementById("upload-input");
    input.click();
    input.onchange = e => {
        let file = e.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = function(evt){
            let nome = file.name.replace(/\W/g,"_").replace(/\.ls$/,"");
            arquivos[nome] = evt.target.result;
            arquivoAtivo = nome;
            atualizarAbas();
            editor.setValue(evt.target.result);
            salvarLocal();
            logTerminal(`Arquivo '${file.name}' importado`, "success");
        };
        reader.readAsText(file);
        input.value = "";
    };
}

// ===== Botões =====
document.getElementById("run-btn").onclick = executarCodigo;
document.getElementById("run-float").onclick = executarCodigo;
document.getElementById("save-btn").onclick = atualizarArquivo;
document.getElementById("save-float").onclick = atualizarArquivo;
document.getElementById("clear-btn").onclick = limparTerminal;
document.getElementById("clear-float").onclick = limparTerminal;
document.getElementById("new-btn").onclick = novoArquivo;
document.getElementById("del-btn").onclick = removerArquivo;
document.getElementById("download-btn").onclick = baixarArquivo;
document.getElementById("upload-btn").onclick = uploadArquivo;

// ===== Inicialização =====
abrirArquivo(arquivoAtivo);
</script>
</body>
</html>
