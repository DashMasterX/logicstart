<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite Plus Pro Max</title>

<!-- CodeMirror CSS -->
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">

<style>
/* ===== Corpo ===== */
body {
    margin: 0;
    font-family: 'Consolas', monospace;
    background: #0b0b1f;
    color: #f8f8f2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== Header ===== */
header {
    background: #1b1b3a;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #50fa7b;
}
header div:first-child { font-size: 1.5em; font-weight: bold; }
header button {
    position: relative;
    overflow: hidden;
    background: linear-gradient(90deg, #6272a4, #50fa7b);
    border: none;
    color: #fff;
    padding: 10px 20px;
    margin-left: 12px;
    cursor: pointer;
    border-radius: 50px;
    font-weight: bold;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
}
header button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(80,250,123,0.5);
}

/* ===== Layout principal ===== */
.main-container { flex:1; display:flex; overflow:hidden; }

/* ===== Painel lateral de arquivos ===== */
#file-panel {
    width: 220px;
    background: #191932;
    border-right: 2px solid #50fa7b;
    display: flex; flex-direction: column;
}
#file-panel h3 {
    margin: 12px; font-size:1.1em; font-weight:bold; color:#8be9fd;
}
.file-list { flex:1; overflow-y:auto; padding:0 10px; }
.file-list div {
    padding:10px; margin-bottom:6px; background:#28284b;
    border-radius:10px; cursor:pointer; transition:0.2s;
}
.file-list div.active, .file-list div:hover {
    background:#50fa7b; color:#000; font-weight:bold;
}

/* ===== Editor com abas ===== */
#editor-area { flex:2; display:flex; flex-direction:column; }
.tab-bar { display:flex; background:#28284b; border-bottom:2px solid #50fa7b; }
.tab-bar div {
    padding:10px 16px; cursor:pointer; color:#f8f8f2; transition:0.2s;
}
.tab-bar div.active { background:#50fa7b; color:#000; font-weight:bold; border-radius:8px 8px 0 0; }

/* ===== Editor CodeMirror ===== */
.CodeMirror { flex:1; height:100%; border-radius:10px 10px 0 0; font-size:14px; border:2px solid #50fa7b; }

/* ===== Terminal ===== */
#terminal {
    flex:1; background:#1a1a3b; padding:12px; overflow-y:auto;
    font-family:monospace; font-size:14px; border-top:2px solid #50fa7b; border-radius:0 0 10px 10px;
}
.terminal .info { color:#8be9fd; }
.terminal .success { color:#50fa7b; }
.terminal .error { color:#ff5555; }

/* ===== Botões flutuantes ===== */
.float-buttons { position:fixed; bottom:30px; right:30px; display:flex; flex-direction:column; gap:18px; }
.float-buttons button {
    background:linear-gradient(45deg,#6272a4,#50fa7b); border:none; color:#fff;
    padding:14px 28px; border-radius:50px; cursor:pointer; font-weight:bold; position:relative;
    overflow:hidden; transition:transform 0.2s ease, box-shadow 0.3s ease;
}
.float-buttons button:hover { transform:scale(1.15); box-shadow:0 6px 22px rgba(80,250,123,0.5); }
.float-buttons button::after { content:""; position:absolute; width:100px; height:100px; background:rgba(255,255,255,0.2);
    border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); transition:transform 0.5s ease,opacity 0.5s ease; }
.float-buttons button:active::after { transform:translate(-50%,-50%) scale(3); opacity:0; }

/* ===== Menu Gerenciador ===== */
#menu-gerenciador { position:fixed; top:70px; left:30px; background:#28284b; border:2px solid #50fa7b; border-radius:10px;
    padding:12px; display:none; flex-direction:column; gap:10px; z-index:99; }
#menu-gerenciador button { background:linear-gradient(45deg,#6272a4,#50fa7b); color:#fff; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; }

/* ===== Menu Temas ===== */
#menu-temas { position:fixed; top:70px; left:270px; background:#28284b; border:2px solid #50fa7b; border-radius:10px;
    padding:12px; display:none; flex-direction:column; gap:10px; z-index:99; }
#menu-temas button { background:linear-gradient(45deg,#6272a4,#50fa7b); color:#fff; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; }

/* ===== Responsivo ===== */
@media (max-width:1024px){.main-container{flex-direction:column;}#file-panel{width:100%;height:150px;flex-direction:row;overflow-x:auto;}#editor-area{flex:1;}.CodeMirror{height:300px;}#terminal{height:200px;}}
</style>
</head>
<body>

<header>
    <div>LogicStart Elite Plus Pro Max</div>
    <div>
        <button id="run-btn">▶ Executar</button>
        <button id="save-btn">💾 Salvar</button>
        <button id="clear-btn">🗑 Limpar</button>
        <button id="menu-btn">☰ Gerenciador</button>
        <button id="tema-btn">🎨 Temas</button>
    </div>
</header>

<!-- Menu Gerenciador -->
<div id="menu-gerenciador">
    <button onclick="novoArquivo()">➕ Novo Arquivo</button>
    <button onclick="removerArquivo()">❌ Remover Arquivo</button>
    <button onclick="downloadArquivo()">⬇ Salvar no Celular</button>
    <input type="file" id="upload-file" style="display:none" onchange="uploadArquivo(event)">
    <button onclick="document.getElementById('upload-file').click()">⬆ Abrir do Celular</button>
</div>

<!-- Menu Temas -->
<div id="menu-temas">
    <button onclick="mudarTema('dracula')">🌓 Dark</button>
    <button onclick="mudarTema('eclipse')">🌄 Sunset</button>
    <button onclick="mudarTema('neon')">💡 Neon</button>
</div>

<div class="main-container">
    <div id="file-panel">
        <h3>Arquivos</h3>
        <div class="file-list" id="file-list"></div>
    </div>

    <div id="editor-area">
        <div class="tab-bar" id="tab-bar"></div>
        <textarea id="editor"></textarea>
        <div id="terminal" class="terminal"></div>
    </div>
</div>

<div class="float-buttons">
    <button id="run-float">▶ Run</button>
    <button id="save-float">💾 Save</button>
    <button id="clear-float">🗑 Clear</button>
</div>

<!-- CodeMirror JS -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<script>
// ===== Inicializa CodeMirror =====
let editor = CodeMirror.fromTextArea(document.getElementById("editor"),{
    mode:{name:"python",version:3,singleLineStringErrors:false},
    theme:"dracula", lineNumbers:true, lineWrapping:true, indentUnit:4, tabSize:4
});

// ===== Arquivos =====
let arquivos = { "main":"# Seu código LogicStart aqui\n" };
let arquivoAtivo = "main";

// ===== Atualiza abas =====
function atualizarAbas(){
    const tabBar=document.getElementById("tab-bar"); tabBar.innerHTML="";
    Object.keys(arquivos).forEach(nome=>{
        let div=document.createElement("div"); div.textContent=nome+".ls";
        div.className=(nome===arquivoAtivo)?"tab active":"tab"; div.onclick=()=>abrirArquivo(nome);
        tabBar.appendChild(div);
    });

    const fileList=document.getElementById("file-list"); fileList.innerHTML="";
    Object.keys(arquivos).forEach(nome=>{
        let div=document.createElement("div"); div.textContent=nome+".ls";
        div.className=(nome===arquivoAtivo)?"active":""; div.onclick=()=>abrirArquivo(nome);
        fileList.appendChild(div);
    });
}

// ===== Abrir arquivo =====
function abrirArquivo(nome){
    if(!arquivos[nome]) return logTerminal(`Arquivo '${nome}' não existe`,"error");
    arquivoAtivo=nome; editor.setValue(arquivos[nome]); atualizarAbas();
}

// ===== Novo arquivo =====
function novoArquivo(){
    let nome=prompt("Nome do novo arquivo:"); if(!nome) return;
    nome=nome.replace(/\W/g,"_"); if(arquivos[nome]) return logTerminal(`Arquivo '${nome}' já existe`,"error");
    arquivos[nome]="# Novo arquivo\n"; abrirArquivo(nome);
}

// ===== Remover arquivo =====
function removerArquivo(){ 
    if(arquivoAtivo==="main") return logTerminal("Não pode remover main","error"); 
    delete arquivos[arquivoAtivo]; arquivoAtivo=Object.keys(arquivos)[0]; abrirArquivo(arquivoAtivo);
}

// ===== Terminal =====
let terminal=document.getElementById("terminal");
function limparTerminal(){ terminal.innerHTML=""; }
function logTerminal(texto,tipo="info"){
    let div=document.createElement("div"); div.className=tipo;
    div.innerHTML=texto.replace(/\n/g,"<br>"); terminal.appendChild(div); terminal.scrollTop=terminal.scrollHeight;
}

// ===== Atualiza arquivo ativo =====
function atualizarArquivoAtivo(){ arquivos[arquivoAtivo]=editor.getValue(); }

// ===== Executar código (simulado) =====
function executarCodigo(){
    atualizarArquivoAtivo(); let codigo=arquivos[arquivoAtivo];
    logTerminal("> Executando código...","info");
    setTimeout(()=>logTerminal("✅ Código executado com sucesso (simulado).","success"),500);
}

// ===== Salvar arquivo no celular =====
function downloadArquivo(){
    atualizarArquivoAtivo();
    const blob=new Blob([arquivos[arquivoAtivo]],{type:"text/plain"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=arquivoAtivo+".ls"; a.click();
}

// ===== Abrir arquivo do celular =====
function uploadArquivo(event){
    const file=event.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
        arquivos[file.name.replace(/\W/g,"_")]=e.target.result;
        abrirArquivo(file.name.replace(/\W/g,"_"));
    };
    reader.readAsText(file);
}

// ===== Menu Gerenciador =====
document.getElementById("menu-btn").onclick=()=>{
    const menu=document.getElementById("menu-gerenciador");
    menu.style.display=(menu.style.display==="flex")?"none":"flex";
};

// ===== Menu Temas =====
document.getElementById("tema-btn").onclick=()=>{
    const menu=document.getElementById("menu-temas");
    menu.style.display=(menu.style.display==="flex")?"none":"flex";
};

// ===== Mudar Tema =====
function mudarTema(nome){
    editor.setOption("theme",nome);
    logTerminal(`Tema alterado para ${nome}`,"info");
}

// ===== Botões flutuantes =====
document.getElementById("run-float").onclick=executarCodigo;
document.getElementById("save-float").onclick=downloadArquivo;
document.getElementById("clear-float").onclick=limparTerminal;
document.getElementById("run-btn").onclick=executarCodigo;
document.getElementById("save-btn").onclick=downloadArquivo;
document.getElementById("clear-btn").onclick=limparTerminal;

// ===== Inicialização =====
document.addEventListener("DOMContentLoaded",()=>{
    atualizarAbas(); abrirArquivo("main");
});
</script>

</body>
</html>
