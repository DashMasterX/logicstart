<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE - Pydroid Style</title>

<!-- CodeMirror CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/python/python.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #2b2b2b;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    font-size: 18px;
    margin: 0;
    color: #569CD6;
}

.menu {
    display: flex;
    flex-wrap: wrap;
}

.menu button {
    background: #3a3a3a;
    border: none;
    color: #d4d4d4;
    padding: 6px 10px;
    margin: 3px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 13px;
}

.menu button:hover {
    background: #505050;
}

.container {
    display: flex;
    flex: 1;
    overflow: hidden;
    flex-direction: row;
}

#editor {
    flex: 2;
    height: 100%;
}

.CodeMirror {
    height: 100%;
    font-family: monospace;
    font-size: 14px;
    background: #1e1e1e;
    color: #d4d4d4;
}

.cm-keyword { color: #569CD6; }
.cm-string { color: #D69D85; }
.cm-comment { color: #6A9955; }
.cm-number { color: #B5CEA8; }
.cm-def { color: #DCDCAA; }

.sidebar {
    flex: 1;
    background: #252525;
    padding: 10px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.sidebar h2 {
    margin-top: 0;
    color: #569CD6;
    font-size: 16px;
}

.output {
    background: #111;
    color: #d4d4d4;
    flex: 1;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
    font-family: monospace;
    font-size: 13px;
    white-space: pre-wrap;
    overflow-y: auto;
}

/* Responsividade celular */
@media(max-width: 768px){
    .container {
        flex-direction: column;
    }
    #editor {
        flex: none;
        height: 50vh;
    }
    .sidebar {
        flex: none;
        height: 50vh;
    }
    .menu button {
        font-size: 12px;
        padding: 5px 8px;
    }
}
</style>
</head>
<body>

<header>
    <h1>LogicStart IDE</h1>
    <div class="menu">
        <button onclick="novo()">Novo</button>
        <button onclick="abrir()">Abrir</button>
        <button onclick="salvar()">Salvar</button>
        <button onclick="executar()">Executar</button>
        <button onclick="mostrarHistorico()">Histórico</button>
        <button onclick="toggleTema()">Tema</button>
    </div>
</header>

<div class="container">
    <textarea id="editor"></textarea>
    <div class="sidebar">
        <h2>Saída</h2>
        <div class="output" id="saida"></div>
    </div>
</div>

<script>
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: "python",
    lineNumbers: true,
    theme: "default",
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: true,
});

function novo() {
    if(confirm("Deseja limpar o editor?")) editor.setValue("");
}

function abrir() {
    alert("Função Abrir: implemente upload de arquivos .py aqui.");
}

function salvar() {
    const codigo = editor.getValue();
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo})
    }).then(res=>res.json())
    .then(data=>{
        alert(data.success ? "Código salvo!" : data.error);
    });
}

function executar() {
    const codigo = editor.getValue();
    fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo})
    }).then(res=>res.json())
    .then(data=>{
        document.getElementById("saida").textContent = data.success ? data.result : data.error;
    });
}

function mostrarHistorico() {
    fetch("/history").then(res=>res.json())
    .then(data=>{
        let out = data.map(d => d.codigo).join("\n\n---\n\n");
        document.getElementById("saida").textContent = out || "Sem histórico";
    });
}

function toggleTema() {
    const body = document.body;
    if(body.style.background === "rgb(30, 30, 30)") {
        body.style.background = "#f5f5f5";
        editor.getWrapperElement().style.background = "#fff";
        editor.getWrapperElement().style.color = "#000";
        editor.setOption("theme", "default");
    } else {
        body.style.background = "#1e1e1e";
        editor.getWrapperElement().style.background = "#1e1e1e";
        editor.getWrapperElement().style.color = "#d4d4d4";
        editor.setOption("theme", "default");
    }
}
</script>

</body>
</html>
