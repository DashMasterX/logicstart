<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite Imperium - IDE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #3a78d7;
    --secondary: #ff5555;
    --bg-gradient: linear-gradient(135deg, #0c0c0c, #1f1f1f);
    --input-bg: #121212;
    --input-border: #444;
    --text-color: #e0e0e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

body {
    background: var(--bg-gradient);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #1b1b1b;
    padding: 15px 30px;
    font-weight: 600;
    font-size: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
}

header button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}
header button:hover { background: #2b5ea0; }

.container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

textarea {
    width: 50%;
    padding: 15px;
    border: none;
    background: var(--input-bg);
    color: var(--text-color);
    font-size: 16px;
    resize: none;
    outline: none;
}

#output {
    width: 50%;
    padding: 15px;
    background: #1e1e1e;
    color: #fff;
    font-family: monospace;
    overflow-y: auto;
}

button#run-btn {
    margin-top: 10px;
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}
button#run-btn:hover { background: #2b5ea0; transform: translateY(-1px); }

.history-panel {
    position: absolute;
    right: 0;
    top: 60px;
    width: 300px;
    height: calc(100% - 60px);
    background: #1b1b1b;
    padding: 15px;
    overflow-y: auto;
    border-left: 1px solid #333;
}

.history-panel h3 {
    margin-bottom: 10px;
    font-size: 16px;
    font-weight: 600;
}

.history-item {
    background: #262626;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}
.history-item:hover { background: #333; }

.loader {
    display: none;
    color: #aaa;
    font-size: 13px;
    margin-top: 5px;
}
.error {
    color: var(--secondary);
    font-size: 13px;
    margin-top: 5px;
}
</style>
</head>
<body>

<header>
    <span>LogicStart Elite IDE</span>
    <button onclick="logout()">Sair</button>
</header>

<div class="container">
    <div style="position: relative; width: 50%;">
        <textarea id="code" placeholder="Digite seu código Python aqui..." spellcheck="false"></textarea>
        <button id="run-btn" onclick="runCode()">Executar</button>
        <div class="loader" id="loader">Executando...</div>
        <div class="error" id="error"></div>
    </div>
    <div id="output"></div>
</div>

<div class="history-panel" id="history-panel">
    <h3>Histórico de códigos</h3>
    <div id="history-list"></div>
</div>

<script>
function setLoading(state) {
    document.getElementById("loader").style.display = state ? "block" : "none";
}

function setError(msg) {
    document.getElementById("error").textContent = msg || "";
}

function runCode() {
    const code = document.getElementById("code").value;
    if(!code) { setError("Digite algum código"); return; }

    setError(""); setLoading(true);
    fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code})
    })
    .then(res => res.json())
    .then(data => {
        setLoading(false);
        if(data.success) {
            document.getElementById("output").textContent = data.result;
            saveCode(code);
        } else {
            setError(data.error || "Erro ao executar");
            document.getElementById("output").textContent = data.debug || "";
        }
    })
    .catch(() => { setLoading(false); setError("Erro de conexão"); });
}

function saveCode(code) {
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code})
    }).then(() => loadHistory());
}

function loadHistory() {
    fetch("/history")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        data.reverse().forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.textContent = item.codigo.substring(0, 50) + (item.codigo.length > 50 ? "..." : "");
            div.onclick = () => document.getElementById("code").value = item.codigo;
            list.appendChild(div);
        });
    });
}

function logout() {
    fetch("/logout").then(() => window.location.href = "/");
}

// Inicializa histórico
loadHistory();
</script>

</body>
</html>
