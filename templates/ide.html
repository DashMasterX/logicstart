<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite Pro Max - Profissional</title>

<!-- CodeMirror CSS -->
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">

<!-- Estilo principal -->
<style>
/* ===== Body e cores ===== */
body {
    margin: 0;
    font-family: 'Consolas', monospace;
    background: #121212;
    color: #f8f8f2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== Header ===== */
header {
    background: #282a36;
    padding: 10px 20px;
    font-size: 1.4em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #6272a4;
}

header button {
    position: relative;
    overflow: hidden;
    background: linear-gradient(90deg, #6272a4, #50fa7b);
    border: none;
    color: white;
    padding: 8px 18px;
    margin-left: 8px;
    cursor: pointer;
    border-radius: 50px;
    font-weight: bold;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
}
header button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 18px rgba(80,250,123,0.5);
}
header button::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.5s ease, opacity 0.5s ease;
}
header button:active::after {
    transform: translate(-50%, -50%) scale(3);
    opacity: 0;
}

/* ===== Layout principal ===== */
.main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* Painel lateral de arquivos */
#file-panel {
    width: 200px;
    background: #1e1e2f;
    border-right: 2px solid #6272a4;
    display: flex;
    flex-direction: column;
}
#file-panel h3 {
    margin: 10px;
    font-size: 1em;
}
.file-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px;
}
.file-list div {
    padding: 8px;
    margin-bottom: 4px;
    background: #282a36;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}
.file-list div:hover {
    background: #44475a;
}

/* Editor com abas */
#editor-area {
    flex: 2;
    display: flex;
    flex-direction: column;
}
.tab-bar {
    display: flex;
    background: #282a36;
    border-bottom: 2px solid #6272a4;
}
.tab-bar div {
    padding: 8px 14px;
    cursor: pointer;
    color: #f8f8f2;
    transition: 0.2s;
}
.tab-bar div.active {
    background: #50fa7b;
    color: #000;
}
.tab-bar div:hover {
    background: #6272a4;
}

/* Editor CodeMirror */
.CodeMirror {
    flex: 1;
    height: 100%;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    border: 2px solid #6272a4;
}

/* Terminal / saída */
#terminal {
    flex: 1;
    background: #1e1e2f;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 14px;
    border-top: 2px solid #6272a4;
}
.terminal .info { color: #8be9fd; }
.terminal .success { color: #50fa7b; }
.terminal .error { color: #ff5555; }

/* Botões flutuantes de ação rápida */
.float-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.float-buttons button {
    background: linear-gradient(45deg,#6272a4,#50fa7b);
    border: none;
    color: #fff;
    padding: 12px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
}
.float-buttons button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 18px rgba(80,250,123,0.5);
}
.float-buttons button::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.5s ease, opacity 0.5s ease;
}
.float-buttons button:active::after {
    transform: translate(-50%,-50%) scale(3);
    opacity: 0;
}

/* Responsivo */
@media (max-width: 1024px) {
    .main-container { flex-direction: column; }
    #file-panel { width: 100%; height: 150px; flex-direction: row; overflow-x: auto; }
    #editor-area { flex: 1; }
    .CodeMirror { height: 300px; }
    #terminal { height: 200px; }
}
</style>
</head>
<body>

<header>
    <div>LogicStart Elite Pro Max - Profissional</div>
    <div>
        <button id="run-btn">▶ Executar</button>
        <button id="save-btn">💾 Salvar</button>
        <button id="clear-btn">🗑 Limpar</button>
    </div>
</header>

<div class="main-container">
    <div id="file-panel">
        <h3>Arquivos</h3>
        <div class="file-list" id="file-list">
            <div onclick="abrirArquivo('main')">main.ls</div>
            <div onclick="abrirArquivo('teste')">teste.ls</div>
        </div>
    </div>

    <div id="editor-area">
        <div class="tab-bar" id="tab-bar">
            <div class="tab active" onclick="abrirAba('main')">main.ls</div>
        </div>
        <textarea id="editor"></textarea>
        <div id="terminal" class="terminal"></div>
    </div>
</div>

<div class="float-buttons">
    <button onclick="executarCodigo()">▶ Run</button>
    <button onclick="salvarCodigo()">💾 Save</button>
</div>

<!-- CodeMirror JS -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<!-- Editor JS profissional -->
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>

</body>
</html>
