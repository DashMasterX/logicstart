<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Empire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    display:flex;
    height:100vh;
    background:#0b0b0b;
    color:#fff;
    font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#141414;
    padding:10px;
    border-right:1px solid #333;
    overflow:auto;
}

.project,.file{
    padding:6px;
    border-radius:4px;
    cursor:pointer;
}
.project:hover,.file:hover{background:#2a2a2a;}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

header{
    background:#121212;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

/* TOOLBAR */
.toolbar{
    background:#1a1a1a;
    padding:8px;
}

.btn{
    background:#3a78d7;
    border:none;
    padding:6px 10px;
    margin-right:5px;
    border-radius:5px;
    color:#fff;
    cursor:pointer;
}
.btn:hover{background:#2b5ea0;}

/* OUTPUT */
.output{
    height:130px;
    background:#000;
    padding:10px;
    font-family:monospace;
    overflow:auto;
}

/* CHAT */
.chat{
    position:absolute;
    right:10px;
    bottom:10px;
    width:260px;
    background:#1e1e1e;
    border-radius:10px;
    display:flex;
    flex-direction:column;
}

.chat-messages{
    height:150px;
    overflow:auto;
    padding:5px;
}

.chat input{
    border:none;
    padding:8px;
    background:#111;
    color:#fff;
}

/* AI */
.ai-box{
    position:absolute;
    right:10px;
    bottom:200px;
    width:260px;
    background:#1e1e1e;
    padding:10px;
    border-radius:10px;
}

.ai-box textarea{
    width:100%;
    height:70px;
    background:#111;
    color:#fff;
    border:none;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Projetos</h3>
<div id="projects"></div>
<button class="btn" onclick="criarProjeto()">+ Projeto</button>

<h3>Arquivos</h3>
<div id="files"></div>
<button class="btn" onclick="novoArquivo()">+ Arquivo</button>
</div>

<div class="main">

<header>
<span id="projectName">Nenhum projeto</span>
<button class="btn" onclick="logout()">Sair</button>
</header>

<div class="toolbar">
<button class="btn" onclick="executar()">▶</button>
<button class="btn" onclick="salvar()">💾</button>
<button class="btn" onclick="deploy()">🌐</button>
<button class="btn" onclick="toggleAI()">🤖</button>
</div>

<textarea id="code"></textarea>

<div class="output" id="output"></div>

</div>

<!-- CHAT -->
<div class="chat">
<div class="chat-messages" id="chatBox"></div>
<input placeholder="Mensagem..." onkeydown="enviar(event)">
</div>

<!-- AI -->
<div class="ai-box" id="aiBox" style="display:none;">
<textarea id="aiPrompt"></textarea>
<button class="btn" onclick="gerarCodigo()">Gerar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script>
let editor=CodeMirror.fromTextArea(document.getElementById("code"),{
    mode:"python",
    theme:"material-darker",
    lineNumbers:true
});

let currentProject=null;
let currentFile=null;
let filesCache={};

/* AUTO SAVE */
setInterval(()=>{
    if(currentProject && currentFile){
        fetch("/file/save",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                project_id:currentProject,
                filename:currentFile,
                code:editor.getValue()
            })
        });
    }
},4000);

/* PROJETOS */
function carregarProjetos(){
    fetch("/projects").then(r=>r.json()).then(data=>{
        let div=document.getElementById("projects");
        div.innerHTML="";
        data.forEach(p=>{
            let el=document.createElement("div");
            el.className="project";
            el.textContent=p.name;
            el.onclick=()=>abrirProjeto(p.project_id);
            div.appendChild(el);
        });
    });
}

function criarProjeto(){
    let nome=prompt("Nome:");
    fetch("/project/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:nome})})
    .then(()=>carregarProjetos());
}

/* PROJETO */
function abrirProjeto(id){
    fetch("/project/"+id).then(r=>r.json()).then(p=>{
        currentProject=id;
        filesCache=p.files||{};
        document.getElementById("projectName").textContent=p.name;
        renderFiles();
    });
}

/* FILES */
function renderFiles(){
    let div=document.getElementById("files");
    div.innerHTML="";
    Object.keys(filesCache).forEach(f=>{
        let el=document.createElement("div");
        el.className="file";
        el.textContent=f;
        el.onclick=()=>abrirArquivo(f);
        div.appendChild(el);
    });
}

function novoArquivo(){
    let nome=prompt("Arquivo:");
    filesCache[nome]="";
    renderFiles();
}

function abrirArquivo(f){
    currentFile=f;
    editor.setValue(filesCache[f]||"");
}

/* EXECUTAR */
function executar(){
    fetch("/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:editor.getValue()})})
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("output").textContent=d.success?d.result:d.error;
    });
}

/* SAVE */
function salvar(){
    filesCache[currentFile]=editor.getValue();
    fetch("/file/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        project_id:currentProject,
        filename:currentFile,
        code:editor.getValue()
    })});
}

/* DEPLOY */
function deploy(){
    let link=location.origin+"/share/"+currentProject;
    prompt("Link do projeto:",link);
}

/* IA */
function toggleAI(){
    let box=document.getElementById("aiBox");
    box.style.display=box.style.display==="none"?"block":"none";
}

function gerarCodigo(){
    let prompt=document.getElementById("aiPrompt").value;
    fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})})
    .then(r=>r.json())
    .then(d=>{
        editor.setValue(d.result);
    });
}

/* CHAT (SIMPLES LOCAL) */
function enviar(e){
    if(e.key==="Enter"){
        let input=e.target;
        let msg=input.value;
        input.value="";

        let box=document.getElementById("chatBox");
        let div=document.createElement("div");
        div.textContent=msg;
        box.appendChild(div);
    }
}

/* LOGOUT */
function logout(){ location.href="/logout"; }

/* INIT */
carregarProjetos();
</script>

</body>
</html>
