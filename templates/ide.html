<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE Pro Max</title>
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #282a36;
    color: #f8f8f2;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: #44475a;
    padding: 12px 20px;
    font-size: 1.5em;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header button {
    background: #6272a4;
    border: none;
    color: white;
    padding: 6px 12px;
    margin-left: 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.2s;
}

header button:hover {
    background: #50577a;
}

.main-container {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
}

#editor-container {
    flex: 2;
    display: flex;
    flex-direction: column;
}

#editor {
    flex: 1;
    height: 100%;
}

#output-container {
    flex: 1;
    background: #1e1e2f;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 14px;
}

.menu {
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
}
.menu button {
    background: #6272a4;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
}
.menu button:hover {
    background: #50577a;
}
</style>
</head>
<body>

<header>
    <div>LogicStart IDE Pro Max</div>
    <div>
        <button onclick="executarCodigo()">Executar ▶</button>
        <button onclick="salvarCodigo()">Salvar 💾</button>
        <button onclick="limparSaida()">Limpar Saída 🗑</button>
    </div>
</header>

<div class="main-container">
    <div id="editor-container">
        <div class="menu">
            <button onclick="inserirComando('variavel x = 0')">Variável</button>
            <button onclick="inserirComando('imprimir()')">Imprimir</button>
            <button onclick="inserirComando('se x > 0:')">Se</button>
            <button onclick="inserirComando('retorna')">Retorna</button>
        </div>
        <textarea id="editor"></textarea>
    </div>
    <div id="output-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>
<script>
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: {name: "python", version: 3, singleLineStringErrors: false},
    theme: "dracula",
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
    lineWrapping: true,
});

function inserirComando(texto) {
    let doc = editor.getDoc();
    let cursor = doc.getCursor();
    doc.replaceRange(texto, cursor);
    editor.focus();
}

function executarCodigo() {
    let codigo = editor.getValue();
    let output = document.getElementById("output-container");
    output.innerHTML += "<div style='color:#50fa7b'>> Executando...</div>";

    fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            output.innerHTML += "<div>" + data.result.replace(/\n/g,"<br>") + "</div>";
        } else {
            output.innerHTML += "<div style='color:#ff5555'>Erro: " + data.error + "</div>";
        }
        output.scrollTop = output.scrollHeight;
    })
    .catch(err => {
        output.innerHTML += "<div style='color:#ff5555'>Erro conexão servidor</div>";
        output.scrollTop = output.scrollHeight;
    });
}

function salvarCodigo() {
    let codigo = editor.getValue();
    fetch("/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: codigo})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.success ? "Código salvo!" : data.error);
    });
}

function limparSaida() {
    document.getElementById("output-container").innerHTML = "";
}
</script>

</body>
</html>
