<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE</title><link rel="stylesheet" href="/static/css/main.css"><style>

.ide{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.topbar{
    height:56px;
    background:var(--bg-secondary);
    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 12px;
}

.workspace{
    flex:1;
    display:flex;
    overflow:hidden;
}

.sidebar{
    width:260px;
    background:var(--bg-secondary);
    border-right:1px solid var(--border);
    overflow:auto;
}

.sidebar-header{
    padding:16px;
    font-weight:700;
}

.file{
    padding:12px 16px;
    cursor:pointer;
}

.file:hover{
    background:var(--bg-tertiary);
}

.editor-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.tabs{
    height:42px;
    background:var(--bg-tertiary);
    border-bottom:1px solid var(--border);
}

.editor{
    flex:1;
    padding:20px;
    background:#1e1e1e;
    font-family:Consolas,monospace;
}

.terminal{
    height:180px;
    background:#111;
    border-top:1px solid var(--border);
    padding:12px;
}

.ai-panel{
    width:340px;
    background:var(--bg-secondary);
    border-left:1px solid var(--border);
}

.ai-header{
    padding:16px;
    border-bottom:1px solid var(--border);
}

.statusbar{
    height:26px;
    background:var(--accent);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 10px;
    color:white;
    font-size:12px;
}

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .ai-panel{
        display:none;
    }

}

</style></head>
<body><div class="ide"><header class="topbar">

    <div>
        🚀 LogicStart IDE
    </div>

    <div>
        Arquivo • Executar • IA
    </div>

</header>

<div class="workspace">

    <aside class="sidebar">

        <div class="sidebar-header">
            Arquivos
        </div>

        <div class="file">main.ls</div>
        <div class="file">teste.ls</div>

    </aside>

    <main class="editor-area">

        <div class="tabs">
            main.ls
        </div>

        <div class="editor">
            // Código LogicStart
        </div>

        <div class="terminal">
            Terminal LogicStart
        </div>

    </main>

    <aside class="ai-panel">

        <div class="ai-header">
            LogicStart AI
        </div>

    </aside>

</div>

<footer class="statusbar">

    <span>Pronto</span>
    <span>LogicStart Elite</span>

</footer>

</div></body>
</html>
