<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart IDE</title>
<style>
/* Reset e corpo */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #181818;
    color: #e0e0e0;
}

/* Container central */
#main-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Box */
.login-box {
    background: #222;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    width: 320px;
    display: none;
}
.login-box.active { display: block; }

.login-box h2 { margin-bottom: 20px; }
.input-field {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #555;
    background: #1e1e1e;
    color: #e0e0e0;
}
.btn {
    width: 100%;
    background: #3a78d7;
    color: white;
    border: none;
    padding: 12px;
    cursor: pointer;
    font-size: 1em;
    border-radius: 5px;
    margin-top: 10px;
    transition: 0.2s;
}
.btn:hover { background: #2b5ea0; }
.oauth-btn { background: #ff5555; margin-top: 5px; }
.oauth-btn:hover { background: #cc4444; }

/* IDE Box */
#ide-box {
    display: none;
    flex-direction: column;
    width: 90%;
    max-width: 1000px;
}
#ide-box.active { display: flex; }

#ide-box textarea {
    width: 100%;
    height: 300px;
    background: #1e1e1e;
    color: #e0e0e0;
    border: none;
    border-radius: 5px;
    padding: 10px;
    font-family: monospace;
    resize: vertical;
}
#ide-box .controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}
.output {
    margin-top: 10px;
    background: #111;
    padding: 10px;
    border-radius: 5px;
    min-height: 100px;
    white-space: pre-wrap;
    font-family: monospace;
}
</style>
</head>
<body>
<div id="main-container">

    <!-- LOGIN -->
    <div class="login-box active" id="login-box">
        <h2>Entrar na LogicStart</h2>
        <input class="input-field" type="email" placeholder="Email" id="email">
        <input class="input-field" type="password" placeholder="Senha" id="senha">
        <button class="btn" onclick="loginEmail()">Entrar</button>
        <button class="btn oauth-btn" onclick="loginGoogle()">Entrar com Google</button>
    </div>

    <!-- IDE -->
    <div id="ide-box">
        <textarea id="codigo" placeholder="Escreva seu código aqui..."></textarea>
        <div class="controls">
            <button class="btn" onclick="executar()">Executar</button>
            <button class="btn" onclick="salvar()">Salvar</button>
            <button class="btn" onclick="logout()">Sair</button>
        </div>
        <div class="output" id="saida"></div>
    </div>

</div>

<script>
function loginEmail() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    if(!email || !senha){ alert("Preencha todos os campos!"); return; }
    fetch("/login/email",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email, senha})
    }).then(res=>res.json()).then(data=>{
        if(data.success){ 
            document.getElementById("login-box").classList.remove("active");
            document.getElementById("ide-box").classList.add("active");
        } else alert(data.error);
    });
}

function loginGoogle() {
    fetch("/login/google").then(()=> {
        document.getElementById("login-box").classList.remove("active");
        document.getElementById("ide-box").classList.add("active");
    });
}

function executar(){
    const codigo = document.getElementById("codigo").value;
    fetch("/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code: codigo})
    }).then(res=>res.json()).then(data=>{
        document.getElementById("saida").textContent = data.success ? data.result : data.error;
    });
}

function salvar(){
    const codigo = document.getElementById("codigo").value;
    const email = prompt("Digite seu e-mail para salvar:");
    if(!email){ return; }
    fetch("/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code: codigo, email: email})
    }).then(res=>res.json()).then(data=>{
        alert(data.success ? "Código salvo!" : data.error);
    });
}

function logout(){
    fetch("/logout").then(()=>{
        document.getElementById("ide-box").classList.remove("active");
        document.getElementById("login-box").classList.add("active");
    });
}
</script>
</body>
</html>
