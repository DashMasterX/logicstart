<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogicStart Elite Supreme Hub</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #1a1a2e;
      --primary: #6e6ef8;
      --text: #f1f1f1;
      --success: #4caf50;
      --error: #ff5c5c;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: var(--bg2);
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    h2 { margin-bottom: 10px; }
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #444;
      background: #121212;
      color: white;
      font-size: 15px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
      transition: 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background: #2b5ea0;
    }
    .btn-secondary {
      background: #444;
      color: white;
    }
    .btn-secondary:hover {
      background: #666;
    }
    .error {
      margin-top: 10px;
      color: var(--error);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container" id="login-container">
  <h2>LogicStart Elite Supreme</h2>
  <input class="input-field" type="email" id="email" placeholder="Email">
  <input class="input-field" type="password" id="senha" placeholder="Senha">
  <button class="btn btn-primary" onclick="login()">Entrar</button>
  <button class="btn btn-secondary" onclick="showRegister()">Criar Conta</button>
  <div class="error" id="error"></div>
</div>

<div class="container" id="register-container" style="display:none;">
  <h2>Criar Conta</h2>
  <input class="input-field" type="email" id="reg-email" placeholder="Email">
  <input class="input-field" type="password" id="reg-senha" placeholder="Senha">
  <button class="btn btn-primary" onclick="register()">Registrar</button>
  <button class="btn btn-secondary" onclick="showLogin()">Voltar</button>
  <div class="error" id="reg-error"></div>
</div>

<script>
function showRegister() {
  document.getElementById("login-container").style.display = "none";
  document.getElementById("register-container").style.display = "block";
}

function showLogin() {
  document.getElementById("register-container").style.display = "none";
  document.getElementById("login-container").style.display = "block";
}

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    document.getElementById("error").innerText = "Preencha todos os campos.";
    return;
  }

  try {
    let r = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, senha }),
    });
    let d = await r.json();
    if (d.success) {
      localStorage.setItem("user_id", d.user_id);
      window.location.href = "/ide.html";
    } else {
      document.getElementById("error").innerText = d.error || "Erro ao logar";
    }
  } catch (e) {
    document.getElementById("error").innerText = "Erro de conexão";
  }
}

async function register() {
  const email = document.getElementById("reg-email").value;
  const senha = document.getElementById("reg-senha").value;

  if (!email || !senha) {
    document.getElementById("reg-error").innerText = "Preencha todos os campos.";
    return;
  }

  try {
    let r = await fetch("/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, senha }),
    });
    let d = await r.json();
    if (d.success) {
      alert("Conta criada! Faça login.");
      showLogin();
    } else {
      document.getElementById("reg-error").innerText = d.error || "Erro ao registrar";
    }
  } catch (e) {
    document.getElementById("reg-error").innerText = "Erro de conexão";
  }
}

if (localStorage.getItem("user_id")) {
  window.location.href = "/ide.html";
}
</script>

</body>
</html>
