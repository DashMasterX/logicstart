<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart Elite</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/theme/dracula.css">

<style>
:root{
--bg:#0f0f1a; --bg2:#1a1a2e; --bg3:#23233a;
--primary:#6e6ef8; --text:#f1f1f1;
--success:#4caf50; --error:#ff5c5c; --info:#00bcd4;
}

body{margin:0;height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'Segoe UI';}

/* HEADER */
header{display:flex;justify-content:space-between;padding:10px;background:var(--bg2);border-bottom:2px solid var(--primary);}
.btn{background:var(--primary);border:none;padding:8px;color:white;border-radius:6px;cursor:pointer}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;background:var(--bg2);border-right:2px solid var(--primary);overflow:auto}
.file{padding:8px;margin:4px;border-radius:6px;background:var(--bg3);cursor:pointer}
.file.active{background:var(--primary)}

/* EDITOR */
.editor{flex:2;display:flex;flex-direction:column}
.tabs{display:flex;background:var(--bg3);overflow-x:auto}
.tab{padding:10px;cursor:pointer}
.tab.active{background:var(--primary)}
.modified::after{content:" ●";color:#ff9800}

.CodeMirror{flex:1}

/* TERMINAL */
.terminal{height:150px;background:black;padding:10px;overflow:auto;font-family:monospace}
.success{color:var(--success)} .error{color:var(--error)} .info{color:var(--info)}

/* IA */
.ai{width:320px;background:var(--bg2);border-left:2px solid var(--primary);display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:10px}
.msg{margin-bottom:10px}
.user{color:#8be9fd} .bot{color:#50fa7b}

textarea{margin:10px;background:var(--bg3);color:white;border:none;padding:10px;border-radius:6px}

/* STATUS */
.status{height:25px;background:var(--bg3);display:flex;justify-content:space-between;padding:5px;font-size:12px}
</style>
</head>

<body>

<header>
<div>🚀 LogicStart Elite</div>
<div>
<button class="btn" onclick="executar()">▶</button>
<button class="btn" onclick="salvar()">💾</button>
<button class="btn" onclick="novoArquivo()">📄</button>
</div>
</header>

<div class="main">

<div class="sidebar" id="files"></div>

<div class="editor">
<div class="tabs" id="tabs"></div>
<textarea id="editor"></textarea>
<div class="terminal" id="terminal"></div>
</div>

<div class="ai">
<div class="chat" id="chat"></div>
<textarea id="prompt" placeholder="Perguntar para IA..."></textarea>
<button class="btn" onclick="chatIA()">Enviar</button>
</div>

</div>

<div class="status">
<span id="status">Pronto</span>
<span>LogicStart</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/python/python.js"></script>

<script>
const user_id="felipe";

let editor=CodeMirror.fromTextArea(document.getElementById("editor"),{
 mode:"python",theme:"dracula",lineNumbers:true
});

let arquivos={}, atual="main", modificados={};
let chatHist=[];

/* STATUS */
function status(s){document.getElementById("status").innerText=s}

/* LOG */
function log(msg,type="info"){
 let t=document.getElementById("terminal");
 let d=document.createElement("div");
 d.className=type;
 d.innerText=msg;
 t.appendChild(d);
 t.scrollTop=t.scrollHeight;
}

/* FILES */
async function carregar(){
 let r=await fetch(`/files?user_id=${user_id}`);
 let d=await r.json();
 arquivos={};
 d.data.forEach(f=>arquivos[f.nome]=f.codigo);
 if(!arquivos["main"]) arquivos["main"]="";
 abrir("main");
 render();
}

function render(){
 let f=document.getElementById("files");
 let t=document.getElementById("tabs");
 f.innerHTML=""; t.innerHTML="";
 Object.keys(arquivos).forEach(n=>{
  let el=document.createElement("div");
  el.className="file "+(n===atual?"active":"");
  el.innerText=n;
  el.onclick=()=>abrir(n);
  f.appendChild(el);

  let tab=document.createElement("div");
  tab.className="tab "+(n===atual?"active":"")+(modificados[n]?" modified":"");
  tab.innerText=n;
  tab.onclick=()=>abrir(n);
  t.appendChild(tab);
 });
}

function abrir(n){
 atual=n;
 editor.setValue(arquivos[n]);
 render();
}

function novoArquivo(){
 let n=prompt("Nome do arquivo:");
 if(!n)return;
 arquivos[n]="";
 abrir(n);
}

/* DETECTAR MUDANÇA */
editor.on("change",()=>{
 modificados[atual]=true;
 arquivos[atual]=editor.getValue();
 render();
 autoSave();
});

/* AUTOSAVE */
let timeout;
function autoSave(){
 clearTimeout(timeout);
 timeout=setTimeout(()=>salvar(),2000);
}

/* SAVE */
async function salvar(){
 status("Salvando...");
 await fetch("/files",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({user_id,nome:atual,codigo:editor.getValue()})
 });
 modificados[atual]=false;
 render();
 status("Salvo");
}

/* RUN */
async function executar(){
 status("Executando...");
 let r=await fetch("/executar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({codigo:editor.getValue()})
 });
 let d=await r.json();
 log(d.data?.saida||d.mensagem,d.status==="ok"?"success":"error");
 status("Finalizado");
}

/* IA */
function addMsg(txt,cls){
 let c=document.getElementById("chat");
 let d=document.createElement("div");
 d.className="msg "+cls;
 d.innerText=txt;
 c.appendChild(d);
 c.scrollTop=c.scrollHeight;
}

async function chatIA(){
 let p=document.getElementById("prompt").value;
 if(!p)return;

 chatHist.push({role:"user",content:p});
 addMsg("Você: "+p,"user");

 let r=await fetch("/ia/chat",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({user_id,mensagem:p,historico:chatHist})
 });

 let d=await r.json();
 chatHist.push({role:"bot",content:d.data});

 addMsg("IA: "+d.data,"bot");
}

/* SHORTCUTS */
document.addEventListener("keydown",(e)=>{
 if(e.ctrlKey && e.key==="s"){e.preventDefault();salvar();}
 if(e.ctrlKey && e.key==="Enter"){executar();}
});

/* INIT */
carregar();
</script>

</body>
</html>
