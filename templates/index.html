<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 LogicStart IDE Pro</title>

<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background-color: #1e1e2f;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    header {
        background-color: #0d0d1a;
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    header h1 {
        margin: 0;
        font-size: 1.2rem;
        color: #4fc3f7;
    }
    #emailContainer {
        display: flex;
        gap: 5px;
    }
    #emailContainer input {
        padding: 5px;
        border-radius: 4px;
        border: none;
    }
    #emailContainer button {
        padding: 5px 10px;
        background-color: #ffc107;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    #tabs {
        display: flex;
        background-color: #121227;
    }
    .tab {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        color: #ccc;
    }
    .tab.active {
        border-bottom: 2px solid #4fc3f7;
        color: #fff;
    }
    #editorContainer {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    #editor {
        flex: 1;
    }
    #runBtn {
        background-color: #4fc3f7;
        border: none;
        padding: 10px 15px;
        font-size: 1rem;
        cursor: pointer;
        color: #000;
        font-weight: bold;
    }
    #output {
        height: 150px;
        background-color: #11111f;
        color: #fff;
        padding: 10px;
        overflow-y: auto;
        font-family: monospace;
    }
</style>
</head>
<body>

<header>
    <h1>🚀 LogicStart IDE Pro</h1>
    <div id="emailContainer">
        <input type="email" id="userEmail" placeholder="Seu email para salvar">
        <button id="saveCodeBtn">💾 Salvar Código</button>
    </div>
</header>

<div id="tabs">
    <div class="tab active" data-file="main.ls">main.ls</div>
</div>

<div id="editorContainer">
    <textarea id="editor"></textarea>
    <button id="runBtn">▶ Executar</button>
</div>

<div id="output">Console de saída</div>

<!-- CodeMirror JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<script>
    // Inicializa o editor
    const editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "javascript",
        theme: "dracula",
        lineNumbers: true,
        autoCloseBrackets: true,
        matchBrackets: true,
        tabSize: 2
    });

    const output = document.getElementById("output");
    const runBtn = document.getElementById("runBtn");
    const saveBtn = document.getElementById("saveCodeBtn");

    // Executar código
    runBtn.addEventListener("click", async () => {
        const code = editor.getValue();
        output.textContent = "Executando...";
        try {
            const res = await fetch("/run", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({code})
            });
            const data = await res.json();
            if(data.success) {
                output.textContent = data.result + "\n\nTempo: " + data.time + "s";
            } else {
                output.textContent = "Erro: " + data.error;
            }
        } catch(e) {
            output.textContent = "Erro ao executar: " + e.message;
        }
    });

    // Salvar código
    saveBtn.addEventListener("click", async () => {
        const email = document.getElementById("userEmail").value;
        const code = editor.getValue();
        if(!email) return alert("Informe um email!");

        try {
            const res = await fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email, code})
            });
            const data = await res.json();
            if(data.success) alert("Código salvo com sucesso!");
            else alert("Falha ao salvar: " + data.error);
        } catch(e) {
            alert("Erro ao salvar: " + e.message);
        }
    });

    // Abas (futuro multi-arquivos)
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
        tab.addEventListener("click", () => {
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            // Aqui você poderia carregar outro arquivo no editor
        });
    });
</script>

</body>
</html>
