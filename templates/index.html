<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 LogicStart IDE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <h1>🚀 LogicStart IDE</h1>
</header>

<main>
    <div id="editor-container" class="fade-in">
        <textarea id="editor" placeholder="Digite seu código aqui..."></textarea>
        <button id="run">▶ Executar</button>
    </div>

    <div id="output-container" class="fade-out">
        <pre id="output">Resultado aparecerá aqui...</pre>
        <button id="back">🔙 Voltar</button>
    </div>
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
