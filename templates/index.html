<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicStart VSCode Mobile</title>

<!-- CodeMirror 6 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/theme/monokai.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/hint/show-hint.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/hint/show-hint.css">

<style>
:root{
  --bg:#0f0f0f; --bg2:#1a1a2e; --bg3:#23233a;
  --primary:#6e6ef8; --text:#f1f1f1;
  --success:#4caf50; --error:#ff5c5c; --info:#00bcd4;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg2);border-bottom:2px solid var(--primary);}
header h1{margin:0;font-size:18px;}
header .btn{background:var(--primary);border:none;padding:8px;color:white;border-radius:6px;cursor:pointer;margin-left:5px;}
header .btn:hover{opacity:0.85;}

/* Main Layout */
.main{flex:1;display:flex;overflow:hidden;transition:all 0.3s;}
.sidebar{width:220px;background:var(--bg2);border-right:2px solid var(--primary);overflow-y:auto;padding:10px;transition:all 0.3s;}
.sidebar.hidden{transform:translateX(-100%);}
.file{padding:8px;margin-bottom:5px;border-radius:6px;background:var(--bg3);cursor:pointer;}
.file.active{background:var(--primary);}
.editor-container{flex:2;display:flex;flex-direction:column;position:relative;}
.tabs{display:flex;background:var(--bg3);overflow-x:auto;border-bottom:2px solid var(--primary);}
.tab{padding:10px;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--primary);}
.tab.modified::after{content:" ●";color:#ff9800;}
#editor{flex:1;}

/* Terminal */
.terminal{height:150px;background:#111;padding:10px;overflow:auto;font-family:monospace;}
.success{color:var(--success);}
.error{color:var(--error);}
.info{color:var(--info);}

/* IA Panel */
.ai-panel{width:300px;background:var(--bg2);border-left:2px solid var(--primary);display:flex;flex-direction:column;transition:all 0.3s;}
.ai-panel.hidden{transform:translateX(100%);}
.chat{flex:1;overflow:auto;padding:10px;}
.msg{margin-bottom:10px;}
.user{color:#8be9fd;}
.bot{color:#50fa7b;}
textarea{margin:10px;background:var(--bg3);color:white;border:none;padding:8px;border-radius:5px;width:90%;font-family:monospace;}
.ai-panel button{margin:5px;background:var(--primary);color:white;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;}
.ai-panel button:hover{opacity:0.85;}

/* Status bar */
.status{height:25px;background:var(--bg3);display:flex;justify-content:space-between;padding:5px;font-size:12px;}

/* Mobile responsiveness */
@media(max-width:900px){
  .sidebar{position:absolute;z-index:10;top:50px;left:0;height:calc(100% - 50px);}
  .ai-panel{position:absolute;top:50px;right:0;height:calc(100% - 50px);}
}
</style>
</head>
<body>

<header>
<h1>🚀 LogicStart Mobile IDE</h1>
<div>
  <button class="btn" onclick="toggleSidebar()">📂</button>
  <button class="btn" onclick="toggleAI()">🤖</button>
  <button class="btn" onclick="novoArquivo()">📄</button>
  <button class="btn" onclick="salvar()">💾</button>
  <button class="btn" onclick="executar()">▶</button>
  <button class="btn" onclick="logout()">🔒</button>
</div>
</header>

<div class="main">
  <!-- Sidebar de arquivos -->
  <div class="sidebar" id="files"></div>

  <!-- Editor e tabs -->
  <div class="editor-container">
    <div class="tabs" id="tabs"></div>
    <textarea id="editor">// Escreva seu código LogicStart aqui</textarea>
    <div class="terminal" id="terminal"></div>
  </div>

  <!-- Painel IA -->
  <div class="ai-panel" id="ai-panel">
    <div class="chat" id="chat"></div>
    <textarea id="ia-prompt" placeholder="Pergunte algo à IA ou peça código..."></textarea>
    <button onclick="iaChat()">💬 Chat</button>
    <button onclick="iaGerar()">📝 Gerar Código</button>
    <button onclick="iaExplicar()">📖 Explicar Código</button>
    <button onclick="iaCorrigir()">🛠 Corrigir Código</button>
  </div>
</div>

<div class="status">
<span id="status">Pronto</span><span>LogicStart</span>
</div>
